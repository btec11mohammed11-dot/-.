<div class="accessibility-buttons">
<button id="increase-font">تكبير النص</button>
<button id="decrease-font">تصغير النص</button>
</div>
</nav>

<div class="container">
<h2>معرض صور لوفينغ هومز</h2>
<p>استمتع ببعض الصور من أنشطتنا ومرافقنا.</p>
<div class="gallery">
    <img src="image/Picture1.jpg" alt="صورة 1">
    <img src="image/Picture2.jpg" alt="صورة 2">
    <img src="image/Picture3.jpg" alt="صورة 3">
    <img src="image/Picture4.jpg" alt="صورة 4">
</div>
</div>

<footer>
  لوفينغ هومز   
</footer>

<script>
// effect بسيط للصور: تكبير عند المرور وإرجاع طبيعي
const imgs = document.querySelectorAll('.gallery img');
imgs.forEach(img => {
    img.addEventListener('click', () => {
        // فتح الصورة بحجم أكبر في نافذة جديدة
        window.open(img.src, '_blank');
    });
});

// Font size accessibility
let fontSize = parseInt(localStorage.getItem('fontSize')) || 16;
document.documentElement.style.fontSize = fontSize + 'px';

document.getElementById('increase-font').addEventListener('click', () => {
    if (fontSize < 32) {
        fontSize += 2;
        document.documentElement.style.fontSize = fontSize + 'px';
        localStorage.setItem('fontSize', fontSize);
    }
});

document.getElementById('decrease-font').addEventListener('click', () => {
    if (fontSize > 12) {
        fontSize -= 2;
        document.documentElement.style.fontSize = fontSize + 'px';
        localStorage.setItem('fontSize', fontSize);
    }
});
</script>

</body>
</html>
